name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build executable
        run: pyinstaller waveshare_can_app.spec --clean
      
      - name: Show build output
        run: |
          ls -R dist

      - name: Rename executable
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            mv dist/WaveshareCANAnalyser.exe dist/waveshare_can_app-windows.exe

          elif [[ "$RUNNER_OS" == "Linux" ]]; then
            mv dist/WaveshareCANAnalyser dist/waveshare_can_app-linux

          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            mv dist/WaveshareCANAnalyser.app dist/waveshare_can_app-macos.app
            zip -r dist/waveshare_can_app-macos.zip dist/waveshare_can_app-macos.app
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: waveshare_can_app-${{ matrix.os }}
          path: dist

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List downloaded files (Debugging)
        run: ls -R

      - name: Make files executable (Linux/Mac)
        run: chmod +x waveshare_can_app-* || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          draft: false
          prerelease: false
          files: |
            waveshare_can_app-linux
            waveshare_can_app-windows.exe
            waveshare_can_app-macos