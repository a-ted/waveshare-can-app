name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install pyinstaller PyQt6 pyserial python-can
      - run: pyinstaller waveshare_can.spec
      - run: cd dist && zip -r WaveshareCANAnalyzer-mac.zip WaveshareCANAnalyzer.app
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/WaveshareCANAnalyzer-mac.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install pyinstaller PyQt6 pyserial python-can
      - run: pyinstaller waveshare_can.spec
      - run: Compress-Archive -Path dist\WaveshareCANAnalyzer -DestinationPath dist\WaveshareCANAnalyzer-win.zip
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist\WaveshareCANAnalyzer-win.zip